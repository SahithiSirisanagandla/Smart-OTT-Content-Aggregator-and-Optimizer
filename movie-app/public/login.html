<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart OTT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

    <div class="login-box">


        <h2 class="login-title">Welcome Back</h2>


        <form id="loginForm" autocomplete="off">

            <input type="text" name="fakeusernameremembered" style="display:none;">
            <input type="password" name="fakepasswordremembered" style="display:none;">


            <input type="email" id="email" placeholder="Email" required autocomplete="new-email">
            <input type="password" id="password" placeholder="Password" required autocomplete="new-password">


            <div class="login-btn-container">
                <button type="submit" class="login-btn">Login</button>
            </div>
        </form>


        <div class="switch">
            Don't have an account?
            <a href="signup.html" class="signup-btn">Signup</a>
        </div>

    </div>

</div>


<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    const res = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials:'include',
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
        localStorage.setItem('user', result.username);
        localStorage.setItem('userId', result.userId);
        localStorage.setItem('username', result.username);

        alert("Welcome " + result.username);
        window.location.href = 'dashboard.html';
    } else {
        alert(result.error);
    }
});
</script>

</body>
</html>
